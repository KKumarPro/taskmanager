<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">▣</span>
          <span class="brand-name">Tasks</span>
        </div>
        <div class="stats" id="stats">0 remaining</div>
      </div>
    </header>

    <main class="main">

      <!-- Add Task Form -->
      <form class="add-form" id="addForm">
        <input
          type="text"
          id="taskInput"
          class="add-input"
          placeholder="Add a new task…"
          maxlength="255"
          autocomplete="off"
        />
        <button type="submit" class="add-btn" title="Add task">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <line x1="9" y1="2" x2="9" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </form>

      <!-- Filter Tabs -->
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList">
        <div class="loading" id="loading">
          <span class="spinner"></span>
          Loading tasks…
        </div>
      </div>

      <!-- Error Banner -->
      <div class="error-banner hidden" id="errorBanner"></div>

    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Edit task</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <input type="text" class="modal-input" id="modalInput" maxlength="255" />
      <div class="modal-footer">
        <button class="btn-ghost" id="modalCancel">Cancel</button>
        <button class="btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
